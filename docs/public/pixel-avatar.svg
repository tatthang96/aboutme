  <rect x="4" y="4" width="3" height="2" fill="none" stroke="#ffd700" stroke-width="0.5"/>
  <rect x="9" y="4" width="3" height="2" fill="none" stroke="#ffd700" stroke-width="0.5"/>
  <line x1="7" y1="5" x2="9" y2="5" stroke="#ffd700" stroke-width="0.5"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 36" width="256" height="288" shape-rendering="crispEdges">
  <!-- Hair -->
  <rect x="10" y="1" width="12" height="1" fill="#1a1a2e"/>
  <rect x="9" y="2" width="14" height="1" fill="#1a1a2e"/>
  <rect x="9" y="3" width="14" height="1" fill="#1a1a2e"/>
  <rect x="9" y="4" width="14" height="1" fill="#1a1a2e"/>

  <!-- Face sides + hair -->
  <rect x="9" y="5" width="1" height="1" fill="#1a1a2e"/>
  <rect x="10" y="5" width="12" height="1" fill="#f5c6a0"/>
  <rect x="22" y="5" width="1" height="1" fill="#1a1a2e"/>

  <!-- Eyes row -->
  <rect x="9" y="6" width="1" height="1" fill="#1a1a2e"/>
  <rect x="10" y="6" width="12" height="1" fill="#f5c6a0"/>
  <rect x="22" y="6" width="1" height="1" fill="#1a1a2e"/>
  <!-- Glasses frames -->
  <rect x="11" y="6" width="3" height="2" fill="none" stroke="#3B82F6" stroke-width="0.6"/>
  <rect x="17" y="6" width="3" height="2" fill="none" stroke="#3B82F6" stroke-width="0.6"/>
  <line x1="14" y1="7" x2="17" y2="7" stroke="#3B82F6" stroke-width="0.6"/>
  <!-- Eyes (inside glasses) -->
  <rect x="12" y="7" width="1" height="1" fill="#1a1a2e"/>
  <rect x="18" y="7" width="1" height="1" fill="#1a1a2e"/>
  <!-- Eye shine -->
  <rect x="12" y="6.5" width="0.5" height="0.5" fill="#ffffff" opacity="0.7"/>
  <rect x="18" y="6.5" width="0.5" height="0.5" fill="#ffffff" opacity="0.7"/>

  <!-- Face lower -->
  <rect x="10" y="8" width="12" height="1" fill="#f5c6a0"/>
  <!-- Smile -->
  <rect x="13" y="8" width="1" height="1" fill="#e8a088"/>
  <rect x="14" y="9" width="4" height="1" fill="#e8a088"/>
  <rect x="18" y="8" width="1" height="1" fill="#e8a088"/>

  <rect x="10" y="9" width="12" height="1" fill="#f5c6a0"/>

  <!-- Neck -->
  <rect x="14" y="10" width="4" height="1" fill="#f5c6a0"/>

  <!-- Shirt / body -->
  <rect x="8" y="11" width="16" height="1" fill="#2563EB"/>
  <rect x="7" y="12" width="18" height="1" fill="#2563EB"/>
  <rect x="7" y="13" width="18" height="1" fill="#2563EB"/>
  <rect x="7" y="14" width="18" height="1" fill="#1D4ED8"/>
  <rect x="8" y="15" width="16" height="1" fill="#1D4ED8"/>
  <!-- Shirt logo/detail -->
  <rect x="14" y="12" width="4" height="2" fill="#3B82F6"/>

  <!-- Upper arms -->
  <rect x="5" y="12" width="2" height="3" fill="#f5c6a0"/>
  <rect x="25" y="12" width="2" height="3" fill="#f5c6a0"/>

  <!-- Forearms reaching to keyboard -->
  <rect x="5" y="15" width="1" height="1" fill="#f5c6a0"/>
  <rect x="6" y="16" width="1" height="1" fill="#f5c6a0"/>
  <rect x="7" y="17" width="1" height="1" fill="#f5c6a0"/>
  <rect x="26" y="15" width="1" height="1" fill="#f5c6a0"/>
  <rect x="25" y="16" width="1" height="1" fill="#f5c6a0"/>
  <rect x="24" y="17" width="1" height="1" fill="#f5c6a0"/>

  <!-- Hands on keyboard -->
  <rect x="8" y="18" width="2" height="1" fill="#f5c6a0"/>
  <rect x="22" y="18" width="2" height="1" fill="#f5c6a0"/>

  <!-- Desk surface -->
  <rect x="2" y="19" width="28" height="1" fill="#475569"/>
  <rect x="1" y="20" width="30" height="1" fill="#334155"/>

  <!-- Keyboard -->
  <rect x="6" y="18" width="20" height="1" fill="#1e293b"/>
  <rect x="5" y="17" width="22" height="1" fill="#334155"/>
  <!-- Keyboard keys (top row) -->
  <rect x="6" y="17" width="1" height="0.5" fill="#64748b"/>
  <rect x="8" y="17" width="1" height="0.5" fill="#64748b"/>
  <rect x="10" y="17" width="1" height="0.5" fill="#64748b"/>
  <rect x="12" y="17" width="1" height="0.5" fill="#64748b"/>
  <rect x="14" y="17" width="3" height="0.5" fill="#60a5fa"/>
  <rect x="18" y="17" width="1" height="0.5" fill="#64748b"/>
  <rect x="20" y="17" width="1" height="0.5" fill="#64748b"/>
  <rect x="22" y="17" width="1" height="0.5" fill="#64748b"/>
  <rect x="24" y="17" width="1" height="0.5" fill="#64748b"/>
  <!-- Keyboard keys (bottom row) -->
  <rect x="7" y="18" width="1" height="0.5" fill="#64748b"/>
  <rect x="9" y="18" width="1" height="0.5" fill="#64748b"/>
  <rect x="11" y="18" width="1" height="0.5" fill="#64748b"/>
  <rect x="13" y="18" width="6" height="0.5" fill="#60a5fa"/>
  <rect x="20" y="18" width="1" height="0.5" fill="#64748b"/>

  <!-- Monitor -->
  <rect x="10" y="21" width="12" height="1" fill="#475569"/>
  <rect x="14" y="22" width="4" height="1" fill="#475569"/>

  <!-- Pants -->
  <rect x="10" y="16" width="12" height="1" fill="#1e293b"/>
  <rect x="10" y="17" width="4" height="0" fill="#1e293b"/>
  <rect x="18" y="17" width="4" height="0" fill="#1e293b"/>

  <!-- Chair back -->
  <rect x="9" y="15" width="1" height="4" fill="#374151"/>
  <rect x="22" y="15" width="1" height="4" fill="#374151"/>
  <rect x="9" y="11" width="1" height="1" fill="#4B5563"/>
  <rect x="22" y="11" width="1" height="1" fill="#4B5563"/>

  <!-- Monitor screen (floating above desk) -->
  <rect x="10" y="0" width="0" height="0" fill="#1e293b"/>

  <!-- Typing animation indicators (little motion lines) -->
  <rect x="8" y="17" width="0.5" height="0.5" fill="#60a5fa" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="0.4s" repeatCount="indefinite"/>
  </rect>
  <rect x="23" y="17" width="0.5" height="0.5" fill="#60a5fa" opacity="0.6">
    <animate attributeName="opacity" values="0;0.6;0" dur="0.4s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating code symbols -->
  <text x="3" y="5" font-family="monospace" font-size="3" fill="#3B82F6" opacity="0.5">
    &lt;/&gt;
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="5;3;5" dur="3s" repeatCount="indefinite"/>
  </text>
  <text x="27" y="8" font-family="monospace" font-size="2.5" fill="#60A5FA" opacity="0.4">
    { }
    <animate attributeName="opacity" values="0.4;0.15;0.4" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="y" values="8;6;8" dur="3.5s" repeatCount="indefinite"/>
  </text>
</svg>

  <!-- Shirt -->
  <rect x="2" y="10" width="12" height="1" fill="#6c5ce7"/>
  <rect x="1" y="11" width="14" height="1" fill="#6c5ce7"/>
  <rect x="1" y="12" width="14" height="1" fill="#6c5ce7"/>
  <rect x="1" y="13" width="14" height="1" fill="#6c5ce7"/>
  <rect x="1" y="14" width="3" height="1" fill="#6c5ce7"/>
  <rect x="4" y="14" width="8" height="1" fill="#5b4cdb"/>
  <rect x="12" y="14" width="3" height="1" fill="#6c5ce7"/>
  <rect x="2" y="15" width="12" height="1" fill="#5b4cdb"/>

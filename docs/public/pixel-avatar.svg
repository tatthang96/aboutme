<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 24" width="128" height="192" shape-rendering="crispEdges">
  <!-- Hair -->
  <rect x="4" y="0" width="8" height="1" fill="#2d1b69"/>
  <rect x="3" y="1" width="10" height="1" fill="#2d1b69"/>
  <rect x="3" y="2" width="10" height="1" fill="#2d1b69"/>
  <!-- Face -->
  <rect x="3" y="3" width="1" height="1" fill="#2d1b69"/>
  <rect x="4" y="3" width="8" height="1" fill="#f5c6a0"/>
  <rect x="12" y="3" width="1" height="1" fill="#2d1b69"/>
  <rect x="3" y="4" width="1" height="1" fill="#2d1b69"/>
  <rect x="4" y="4" width="8" height="1" fill="#f5c6a0"/>
  <rect x="12" y="4" width="1" height="1" fill="#2d1b69"/>
  <!-- Eyes -->
  <rect x="3" y="5" width="10" height="1" fill="#f5c6a0"/>
  <rect x="5" y="5" width="2" height="1" fill="#1a1a2e"/>
  <rect x="9" y="5" width="2" height="1" fill="#1a1a2e"/>
  <!-- Face lower -->
  <rect x="3" y="6" width="10" height="1" fill="#f5c6a0"/>
  <rect x="4" y="7" width="8" height="1" fill="#f5c6a0"/>
  <rect x="6" y="7" width="4" height="1" fill="#e8a088"/>

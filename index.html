<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tat Thang | About Me</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .profile-card {
            max-width: 560px;
            width: 100%;
            background: #1e293b;
            border-radius: 16px;
            padding: 3rem 2.5rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .bio {
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
            margin-bottom: 0.75rem;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .skill-tag {
            background: #334155;
            color: #cbd5e1;
            padding: 0.4rem 0.9rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .interests {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
        }

        .interest-tag {
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            padding: 0.4rem 0.9rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .github-link {
            display: inline-block;
            margin-top: 2rem;
            color: #6366f1;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .github-link:hover {
            color: #818cf8;
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="avatar">TT</div>
        <h1>Tat Thang</h1>
        <p class="bio">
            Hi there! I'm a developer who enjoys building things for the web.
            Always learning, always coding.
        </p>

        <p class="section-title">Skills</p>
        <div class="skills">
            <span class="skill-tag">JavaScript</span>
            <span class="skill-tag">HTML &amp; CSS</span>
            <span class="skill-tag">Python</span>
            <span class="skill-tag">Git</span>
        </div>

        <p class="section-title">Interests</p>
        <div class="interests">
            <span class="interest-tag">Web Development</span>
            <span class="interest-tag">Open Source</span>
            <span class="interest-tag">Problem Solving</span>
        </div>

        <a class="github-link" href="https://github.com/tatthang96" target="_blank">
            github.com/tatthang96
        </a>
    </div>
</body>
</html>
